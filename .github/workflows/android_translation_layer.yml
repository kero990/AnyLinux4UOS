name: Build Android Translation Layer AppImage (ARM64)
jobs:
  build:
    runs-on: ubuntu-22.04-arm          # 使用 GitHub 的 ARM64 运行器
    container:
      image: ghcr.io/pkgforge-dev/archlinux:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4      # 如果需要上传 release，可保留；若仅构建 artifact 可省略

      - name: Setup anylinux environment
        uses: pkgforge-dev/anylinux-setup-action@0964f2258d6c93d1391359978dde081fd8b3c6af

      - name: Install base dependencies
        run: |
          pacman -Syu --noconfirm pipewire-audio patchelf meson ninja vulkan-devel
          get-debloated-pkgs --add-mesa libxml2-mini opus-mini gdk-pixbuf2-mini librsvg-mini

      - name: Build vixl with Meson (Python 3 compatible)
        run: |
          git clone https://github.com/Linaro/vixl -b 8.0.0 /tmp/vixl
          cd /tmp/vixl
          curl -sSL "https://gitlab.alpinelinux.org/alpine/aports/-/raw/master/testing/vixl/0001-vixl-Meson-support.patch" -o /tmp/meson.patch
          patch -p1 --batch < /tmp/meson.patch
          meson setup build --prefix=/usr --buildtype=release
          ninja -C build
          ninja -C build install
          cd /




      - name: Install yay and android_translation_layer from AUR
        run: |
          # 为 nobody 创建可写的临时家目录
          mkdir -p /tmp/nobody-home
          chown nobody:nobody /tmp/nobody-home

          # 允许 nobody 免密码使用 pacman
          echo "nobody ALL=(ALL) NOPASSWD: /usr/bin/pacman" >> /etc/sudoers
          chage -E -1 -I -1 -m 0 -M 99999 nobody

          # 安装 yay
          git clone https://aur.archlinux.org/yay-bin.git /tmp/yay-bin
          cd /tmp/yay-bin
          chown -R nobody:nobody /tmp/yay-bin /tmp/nobody-home
          sudo -u nobody HOME=/tmp/nobody-home makepkg -si --noconfirm

          # 安装 ATL（同样指定 HOME）
          sudo -u nobody HOME=/tmp/nobody-home yay -S --noconfirm android_translation_layer


      - name: Assemble AppDir and create AppImage
        run: |
          mkdir -p AppDir/bin

          # Desktop entries fix hook
          cat > AppDir/bin/fix-desktop-entries.src.hook <<'HOOK'
          #!/bin/sh
          _fix_desktop_entries() {
            for cmd in grep sed sleep; do
              command -v "$cmd" 1>/dev/null || return 1
            done
            if [ -z "$APPIMAGE" ] || [ -z "$APPDIR" ]; then
              return 1
            fi
            t=0
            d=${XDG_DATA_HOME:-~/.local/share}/xdg-desktop-portal/applications
            to_fix=$APPDIR/bin/android-translation-layer
            fix=$APPIMAGE
            while [ "$t" -lt 60 ]; do
              for f in "$d"/*.desktop; do
                [ -f "$f" ] || continue
                if grep -q "$to_fix" "$f"; then
                  if _tmp_sed=$(sed -e "s|$to_fix|$fix|g" "$f"); then
                    echo "$_tmp_sed" > "$f"
                    >&2 echo "[fix-desktop-entries] Fixed launch path in $f"
                  fi
                fi
              done
              t=$(( t + 1 ))
              sleep 1
            done
            return 0
          }
          case "$1" in
            -i|--install) _fix_desktop_entries &;;
          esac
          HOOK
          chmod +x AppDir/bin/fix-desktop-entries.src.hook

          # Desktop file
