name: Build Android Translation Layer AppImage (ARM64)

on:
  workflow_dispatch:          # 允许手动触发
  push:
    tags:
      - 'v*'                 # 推送版本标签时自动构建

jobs:
  build:
    runs-on: ubuntu-22.04-arm          # 使用 GitHub 的 ARM64 运行器
    container:
      image: ghcr.io/pkgforge-dev/archlinux:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4      # 如果需要上传 release，可保留；若仅构建 artifact 可省略

      - name: Setup anylinux environment
        uses: pkgforge-dev/anylinux-setup-action@0964f2258d6c93d1391359978dde081fd8b3c6af

      - name: Install base dependencies
        run: |
          pacman -Syu --noconfirm pipewire-audio patchelf meson ninja vulkan-devel
          get-debloated-pkgs --add-mesa libxml2-mini opus-mini gdk-pixbuf2-mini librsvg-mini

      - name: Build vixl with Meson (Python 3 compatible)
        run: |
          git clone https://github.com/Linaro/vixl -b 8.0.0 /tmp/vixl
          cd /tmp/vixl
          curl -sSL "https://gitlab.alpinelinux.org/alpine/aports/-/raw/master/testing/vixl/0001-vixl-Meson-support.patch" -o /tmp/meson.patch
          patch -p1 --batch < /tmp/meson.patch
          meson setup build --prefix=/usr -Dbuild_type=release
          ninja -C build
          ninja -C build install
          cd /

      - name: Install yay and android_translation_layer from AUR
        run: |
          echo "nobody ALL=(ALL) NOPASSWD: /usr/bin/pacman" >> /etc/sudoers
          chage -E -1 -I -1 -m 0 -M 99999 nobody
          git clone https://aur.archlinux.org/yay-bin.git /tmp/yay-bin
          cd /tmp/yay-bin
          chown -R nobody:nobody /tmp/yay-bin
          sudo -u nobody makepkg -si --noconfirm
          export _JAVA_OPTIONS="-Xmx4g"
          sudo -u nobody yay -S --noconfirm android_translation_layer

      - name: Assemble AppDir and create AppImage
        run: |
          mkdir -p AppDir/bin

          # Desktop entries fix hook
          cat > AppDir/bin/fix-desktop-entries.src.hook <<'HOOK'
          #!/bin/sh
          _fix_desktop_entries() {
            for cmd in grep sed sleep; do
              command -v "$cmd" 1>/dev/null || return 1
            done
            if [ -z "$APPIMAGE" ] || [ -z "$APPDIR" ]; then
              return 1
            fi
            t=0
            d=${XDG_DATA_HOME:-~/.local/share}/xdg-desktop-portal/applications
            to_fix=$APPDIR/bin/android-translation-layer
            fix=$APPIMAGE
            while [ "$t" -lt 60 ]; do
              for f in "$d"/*.desktop; do
                [ -f "$f" ] || continue
                if grep -q "$to_fix" "$f"; then
                  if _tmp_sed=$(sed -e "s|$to_fix|$fix|g" "$f"); then
                    echo "$_tmp_sed" > "$f"
                    >&2 echo "[fix-desktop-entries] Fixed launch path in $f"
                  fi
                fi
              done
              t=$(( t + 1 ))
              sleep 1
            done
            return 0
          }
          case "$1" in
            -i|--install) _fix_desktop_entries &;;
          esac
          HOOK
          chmod +x AppDir/bin/fix-desktop-entries.src.hook

          # Desktop file
          cat > AppDir/android-translation-layer.desktop <<EOF
          [Desktop Entry]
          Name=Android Translation Layer
          Exec=android-translation-layer
          Comment=A translation layer that allows running Android apps on a Linux system
          StartupWMClass=android-translation-layer
          Type=Application
          Categories=Utility
          Icon=android-translation-layer
          EOF

          # Environment for quick-sharun
          export OUTPATH=./dist
          export DEPLOY_OPENGL=1
          export DEPLOY_GSTREAMER=1
          export DEPLOY_PIPEWIRE=1
          export ICON="https://gitlab.com/android_translation_layer/android_translation_layer/-/raw/master/doc/logo.svg"
          export PATH_MAPPING='/usr/bin/addr2line:${SHARUN_DIR}/bin/addr2line'

          quick-sharun \
            /usr/bin/android-translation-layer \
            /usr/bin/addr2line                 \
            /usr/bin/dex2oat                   \
            /usr/bin/dalvikvm                  \
            /usr/bin/dx                        \
            /usr/lib/libOpenSLES.so*           \
            /usr/lib/java                      \
            /usr/lib/art                       \
            /usr/share/atl

          # Bundle Java CA certificates
          mkdir -p ./AppDir/share/ssl/certs/java
          cp -v /etc/ca-certificates/extracted/java-cacerts.jks ./AppDir/share/ssl/certs/java/cacerts

          # Generate AppImage
          quick-sharun --make-appimage

          # List output for debugging
          ls -lh *.AppImage

      - name: Upload AppImage as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android_Translation_Layer-${{ github.sha }}-arm64
          path: ./*.AppImage

      - name: Create release (only on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./*.AppImage
          generate_release_notes: true
