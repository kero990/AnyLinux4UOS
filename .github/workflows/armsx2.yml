name: Build ARMSX2 AppImage (ARM64) with version from tag

on:
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: ghcr.io/pkgforge-dev/archlinux:latest
    steps:
      - name: Setup anylinux environment
        uses: pkgforge-dev/anylinux-setup-action@0964f2258d6c93d1391359978dde081fd8b3c6af

      - name: Install base dependencies
        run: |
          echo "Installing package dependencies..."
          pacman -Syu --noconfirm shaderc qt6ct kvantum lxqt-qtplugin cmake clang ninja lld libwebp sdl3 base-devel git extra-cmake-modules libbacktrace qt6-tools kddockwidgets vulkan-headers vulkan-icd-loader ccache llvm ffmpeg
          echo "Installing debloated packages..."
          get-debloated-pkgs --add-common --prefer-nano

          echo "Installing yay..."
          echo "nobody ALL=(ALL) NOPASSWD: /usr/bin/pacman" >> /etc/sudoers
          chage -E -1 -I -1 -m 0 -M 99999 nobody
          git clone https://aur.archlinux.org/yay-bin.git /tmp/yay-bin
          cd /tmp/yay-bin
          chown -R nobody:nobody /tmp/yay-bin
          sudo -u nobody makepkg -si --noconfirm
          sudo -u nobody yay -S --noconfirm plutosvg-git rapidyaml

      - name: Clone ARMSX2
        uses: actions/checkout@v4      # 检出触发标签对应的代码
        with:
          repository: ARMSX2/ARMSX2
          ref: ${{ github.ref }}
          submodules: recursive
          path: ARMSX2

      - name: Extract latest Linux tag version
        id: version
        run: |
          # 获取所有标签，过滤包含 "linux" 的，按版本排序取最新
          git -C ARMSX2 fetch --tags
          TAG=$(git -C ARMSX2 tag | grep -i 'linux' | sort -V | tail -n 1)
          if [ -z "$TAG" ]; then
            echo "No Linux tag found, using fallback 0.0.0"
            TAG="0.0.0"
          fi
          # 提取纯数字版本号，假设格式为 "ARMSX2 linux x.y.z" 或 "ARMSX2 linux vx.y.z"
          VERSION=$(echo "$TAG" | sed -nE 's/^.*linux *v?([0-9]+\.[0-9]+\.[0-9]+).*$/\1/p')
          if [ -z "$VERSION" ]; then
            VERSION="0.0.0"
          fi
          echo "Detected Linux tag: $TAG -> version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build dependencies and compile
        run: |
          cd ARMSX2
          echo "Building FFmpeg and Qt dependencies..."
          chmod +x .github/workflows/scripts/linux/build-dependencies-qt.sh
          BUILD_FFMPEG=1 .github/workflows/scripts/linux/build-dependencies-qt.sh "$HOME/deps"

          echo "Downloading patches.zip..."
          wget https://github.com/isztldav/pcsx2_patches/releases/latest/download/patches.zip -O bin/resources/patches.zip

          cmake -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_EXE_LINKER_FLAGS_INIT="-fuse-ld=lld" \
            -DCMAKE_MODULE_LINKER_FLAGS_INIT="-fuse-ld=lld" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_SETCAP=OFF \
            -DDISABLE_ADVANCE_SIMD=TRUE \
            -DUSE_LINKED_FFMPEG=ON \
            -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON

          ninja -C build install

      - name: Package AppImage with version
        run: |
          cd ARMSX2
          export OUTPATH=./dist
          # VERSION 环境变量已从之前步骤设置，quick-sharun 会自动使用
          echo "Packaging ARMSX2 version: $VERSION"

          quick-sharun \
            $PWD/bin/armsx2-qt \
            $PWD/bin/* \
            /usr/lib/libshaderc*

          cp bin/resources/ AppDir/bin/ -r
          cp bin/translations/ AppDir/bin/ -r
          cp bin/utils/ AppDir/bin/ -r
          cp bin/docs/ AppDir/bin/ -r

          # 生成 AppImage，VERSION 会影响文件名和内部信息
          quick-sharun --make-appimage

          # 确保 AppImage 文件名包含版本号（quick-sharun 可能自动生成，否则重命名）
          if ls *.AppImage 2>/dev/null; then
            APPIMAGE_FILE=$(ls *.AppImage | head -1)
            NEW_NAME="ARMSX2-${VERSION}-linux-aarch64.AppImage"
            mv "$APPIMAGE_FILE" "$NEW_NAME"
            echo "Renamed to $NEW_NAME"
          fi

          # 移动到工作区方便上传
          cp *.AppImage $GITHUB_WORKSPACE/ || true

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ARMSX2-${{ steps.version.outputs.version }}-arm64
          path: "*.AppImage"

      - name: Create release (only on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.AppImage"
          generate_release_notes: true
